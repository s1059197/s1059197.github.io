<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BUSHRUN</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #1a1a2e;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: monospace;
    overflow: hidden;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  canvas {
    border: 4px solid #e94560;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
  }
  /* Mobile touch controls overlay */
  #touch-controls {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    pointer-events: none;
    z-index: 10;
  }
  #touch-controls .btn {
    position: absolute;
    pointer-events: auto;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 3px solid rgba(255,255,255,0.3);
    display: flex;
    justify-content: center;
    align-items: center;
    color: rgba(255,255,255,0.6);
    font-size: 28px;
    font-family: monospace;
    font-weight: bold;
  }
  #touch-controls .btn:active {
    background: rgba(255,255,255,0.3);
    border-color: rgba(255,255,255,0.5);
  }
  #btn-left { width: 64px; height: 64px; bottom: 20px; left: 20px; }
  #btn-right { width: 64px; height: 64px; bottom: 20px; left: 100px; }
  #btn-jump { width: 80px; height: 80px; bottom: 14px; right: 20px; }

  @media (pointer: coarse) {
    #touch-controls { display: block; }
  }
</style>
</head>
<body>
<canvas id="game" width="640" height="400"></canvas>
<div id="touch-controls">
  <div id="btn-left" class="btn">&lt;</div>
  <div id="btn-right" class="btn">&gt;</div>
  <div id="btn-jump" class="btn">JUMP</div>
</div>
<script>
// ============================================================
//  BUSHRUN - A side-scrolling bush-jumping adventure
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ---------- responsive scaling ----------
function resizeCanvas() {
  const ratio = 640 / 400;
  let w = window.innerWidth;
  let h = window.innerHeight;
  // on mobile with touch controls, leave room at bottom
  const isMobile = window.matchMedia('(pointer: coarse)').matches;
  if (isMobile) h -= 100;
  if (w / h > ratio) {
    canvas.style.height = h + 'px';
    canvas.style.width = (h * ratio) + 'px';
  } else {
    canvas.style.width = w + 'px';
    canvas.style.height = (w / ratio) + 'px';
  }
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const W = canvas.width;
const H = canvas.height;
const GROUND_Y = H - 60;
const GRAVITY = 0.45;
const JUMP_FORCE = -12;
const SCROLL_SPEED_BASE = 1.8;
const MAX_LIVES = 5;

// ---------- colors ----------
const COL = {
  sky1: '#70b8e8', sky2: '#a0d8f0', sky3: '#d0ecff',
  grass1: '#4a8c3f', grass2: '#5a9c4f',
  dirt: '#8b6e4e', dirtDark: '#6b4e2e',
  bush: '#2d6e2d', bushLight: '#3a8a3a', bushDark: '#1a4e1a',
  bushFlower: '#e8e850',
  player: '#3070d0', playerSkin: '#f0c090', playerHair: '#604020',
  text: '#ffffff', score: '#f0e060',
  heart: '#e04060', heartCrack: '#000000',
  shadow: 'rgba(0,0,0,0.18)',
  trunk: '#806040', leaves: '#308030', leavesDark: '#206820',
  building: '#8888a0', buildingDark: '#686880',
  roof: '#a05050', window: '#f0e870', windowOff: '#606880',
  cloud: 'rgba(255,255,255,0.7)',
  path: '#c8b88a',
};

// ---------- character styles ----------
const CHAR_STYLES = {
  'Phil':           { shirt: '#d04040', hair: '#604020', skin: '#f0c090' },
  'Bud':            { shirt: '#40a040', hair: '#303030', skin: '#e0b080' },
  'Mark':           { shirt: '#4040c0', hair: '#806040', skin: '#f0c090' },
  'Big Mike':       { shirt: '#c06000', hair: '#202020', skin: '#a07050', big: true },
  'Nate Dogg':      { shirt: '#808080', hair: '#101010', skin: '#8b6040', shades: true },
  'Marla':          { shirt: '#c040c0', hair: '#d0a020', skin: '#f0c090', female: true },
  'Hot Debbie':     { shirt: '#e04080', hair: '#d06020', skin: '#f0c890', female: true },
  'Box-out Becky':  { shirt: '#e08020', hair: '#604020', skin: '#f0c090', female: true, big: true },
  'Cindy':          { shirt: '#ff69b4', hair: '#301010', skin: '#f0c090', female: true, heart: true },
};

const DECORATION_NAMES = ['Phil', 'Bud', 'Mark', 'Big Mike', 'Nate Dogg', 'Marla', 'Hot Debbie', 'Box-out Becky'];

// ---------- game state ----------
let state = 'title'; // title | playing | gameover
let score = 0;
let highScore = parseInt(localStorage.getItem('bushrun_hi') || '0');
let lives = MAX_LIVES;
let scrollX = 0;
let scrollSpeed = SCROLL_SPEED_BASE;
let frameCount = 0;
let difficultyLevel = 0;
let shakeTimer = 0, shakeX = 0, shakeY = 0;
let invincibleTimer = 0;
let respawnTimer = 0;
let groundGraceTimer = 0; // brief grace period when touching ground

// player
const player = {
  x: 120, y: GROUND_Y - 28,
  w: 22, h: 28,
  vy: 0,
  onGround: true,
  onBush: null,
  jumping: false,
  alive: true,
  landedBushes: 0,
};

let bushes = [];
let decorPeople = [];
let clouds = [];
let bgTrees = [];
let bgBuildings = [];
let particles = [];

let nextBushX = 250;
let nextDecoX = 400;
let nextCloudX = 0;
let nextTreeX = 0;
let nextBuildingX = 0;

// ---------- input ----------
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
  if (state === 'title' && (e.key === ' ' || e.key === 'Enter')) startGame();
  if (state === 'gameover' && (e.key === ' ' || e.key === 'Enter')) startGame();
  if (state === 'playing' && (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w')) tryJump();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function tryJump() {
  if (player.onGround && respawnTimer <= 0) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    player.jumping = true;
    player.onBush = null;
    spawnParticles(player.x + 11, player.y + player.h, '#8b6e4e', 5);
  }
}

// ---------- touch controls ----------
// Canvas tap (for title/gameover + jump)
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'title' || state === 'gameover') { startGame(); return; }
  if (state === 'playing') tryJump();
});

// D-pad buttons
const btnLeft = document.getElementById('btn-left');
const btnRight = document.getElementById('btn-right');
const btnJump = document.getElementById('btn-jump');

function addTouchBtn(el, keyName, action) {
  el.addEventListener('touchstart', e => {
    e.preventDefault();
    e.stopPropagation();
    keys[keyName] = true;
    if (action) action();
  });
  el.addEventListener('touchend', e => {
    e.preventDefault();
    e.stopPropagation();
    keys[keyName] = false;
  });
  el.addEventListener('touchcancel', e => {
    keys[keyName] = false;
  });
}

addTouchBtn(btnLeft, 'ArrowLeft');
addTouchBtn(btnRight, 'ArrowRight');
addTouchBtn(btnJump, '_jump', () => {
  if (state === 'title' || state === 'gameover') { startGame(); return; }
  if (state === 'playing') tryJump();
});

// ---------- generation ----------
function spawnBush(x) {
  const bushW = 65 + Math.random() * 35;
  const bushH = 32 + Math.random() * 15;
  // fewer elevated bushes, and lower elevation
  const elevation = Math.random() < 0.2 ? (20 + Math.random() * 30) : 0;
  const y = GROUND_Y - elevation;
  return { x, y, w: bushW, h: bushH, hasFlower: Math.random() < 0.3, elevation };
}

function spawnDecoPerson(x) {
  const name = DECORATION_NAMES[Math.floor(Math.random() * DECORATION_NAMES.length)];
  const style = CHAR_STYLES[name];
  const big = style.big;
  return {
    x, y: GROUND_Y - (big ? 36 : 28),
    w: big ? 30 : 22, h: big ? 36 : 28,
    name, style,
    walkFrame: Math.random() * Math.PI * 2,
    dir: Math.random() < 0.5 ? 1 : -1,
  };
}

function spawnCindy(x) {
  const style = CHAR_STYLES['Cindy'];
  return {
    x, y: GROUND_Y - 28, w: 22, h: 28,
    name: 'Cindy', style,
    walkFrame: Math.random() * Math.PI * 2,
    dir: -1, isCindy: true,
  };
}

function initWorld() {
  bushes = [];
  decorPeople = [];
  clouds = [];
  bgTrees = [];
  bgBuildings = [];
  particles = [];

  // starting platform bush (big, easy to land on)
  bushes.push({ x: 60, y: GROUND_Y, w: 120, h: 38, hasFlower: false, elevation: 0 });

  nextBushX = 220;
  for (let i = 0; i < 12; i++) {
    bushes.push(spawnBush(nextBushX));
    nextBushX += 80 + Math.random() * 80;
  }

  nextDecoX = 400;
  for (let i = 0; i < 5; i++) {
    decorPeople.push(spawnDecoPerson(nextDecoX));
    nextDecoX += 200 + Math.random() * 300;
  }
  decorPeople.push(spawnCindy(700 + Math.random() * 200));

  nextCloudX = 0;
  for (let i = 0; i < 8; i++) {
    clouds.push({
      x: nextCloudX, y: 20 + Math.random() * 80,
      w: 50 + Math.random() * 60, h: 20 + Math.random() * 15,
      speed: 0.2 + Math.random() * 0.3,
    });
    nextCloudX += 80 + Math.random() * 100;
  }

  nextTreeX = 50;
  for (let i = 0; i < 10; i++) {
    bgTrees.push({ x: nextTreeX, scale: 0.5 + Math.random() * 0.5 });
    nextTreeX += 100 + Math.random() * 150;
  }

  nextBuildingX = 200;
  for (let i = 0; i < 5; i++) {
    bgBuildings.push({ x: nextBuildingX, bw: 40 + Math.random() * 30, bh: 50 + Math.random() * 40 });
    nextBuildingX += 200 + Math.random() * 200;
  }
}

let nextCindyScore = 1500;

function extendWorld() {
  const edgeX = scrollX + W + 200;

  while (nextBushX < edgeX) {
    const gap = 60 + Math.random() * (70 + difficultyLevel * 8);
    nextBushX += gap;
    bushes.push(spawnBush(nextBushX));
  }

  while (nextDecoX < edgeX) {
    nextDecoX += 250 + Math.random() * 350;
    decorPeople.push(spawnDecoPerson(nextDecoX));
  }

  if (score > nextCindyScore) {
    decorPeople.push(spawnCindy(scrollX + W + 100 + Math.random() * 200));
    nextCindyScore += 1500 + Math.random() * 1000;
  }

  while (nextCloudX < edgeX) {
    nextCloudX += 80 + Math.random() * 120;
    clouds.push({
      x: nextCloudX, y: 15 + Math.random() * 80,
      w: 50 + Math.random() * 60, h: 20 + Math.random() * 15,
      speed: 0.2 + Math.random() * 0.3,
    });
  }

  while (nextTreeX < edgeX) {
    nextTreeX += 100 + Math.random() * 150;
    bgTrees.push({ x: nextTreeX, scale: 0.5 + Math.random() * 0.5 });
  }

  while (nextBuildingX < edgeX) {
    nextBuildingX += 200 + Math.random() * 250;
    bgBuildings.push({ x: nextBuildingX, bw: 40 + Math.random() * 30, bh: 50 + Math.random() * 40 });
  }

  const cutoff = scrollX - 300;
  bushes = bushes.filter(b => b.x + b.w > cutoff);
  decorPeople = decorPeople.filter(d => d.x > cutoff);
  clouds = clouds.filter(c => c.x + c.w > cutoff - 200);
  bgTrees = bgTrees.filter(t => t.x > cutoff - 100);
  bgBuildings = bgBuildings.filter(b => b.x + b.bw > cutoff - 100);
}

// ---------- particles ----------
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: -Math.random() * 4 - 1,
      life: 20 + Math.random() * 20,
      color, size: 2 + Math.random() * 3,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ---------- lives system ----------
function loseLife() {
  if (invincibleTimer > 0) return;
  lives--;
  shakeTimer = 20;
  invincibleTimer = 120; // 2 seconds of invincibility
  player.landedBushes = 0;
  spawnParticles(player.x + 11, player.y + 14, '#ff4040', 15);

  if (lives <= 0) {
    state = 'gameover';
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('bushrun_hi', highScore.toString());
    }
  } else {
    // respawn: put player on nearest upcoming bush
    respawnTimer = 30;
    player.vy = JUMP_FORCE * 0.7;
    player.onGround = false;
    player.onBush = null;
  }
}

// ---------- game logic ----------
function startGame() {
  state = 'playing';
  score = 0;
  lives = MAX_LIVES;
  scrollX = 0;
  scrollSpeed = SCROLL_SPEED_BASE;
  difficultyLevel = 0;
  shakeTimer = 0;
  frameCount = 0;
  invincibleTimer = 0;
  respawnTimer = 0;
  groundGraceTimer = 0;
  player.x = 120;
  player.y = GROUND_Y - player.h;
  player.vy = 0;
  player.onGround = true;
  player.onBush = null;
  player.jumping = false;
  player.alive = true;
  player.landedBushes = 0;
  nextBushX = 250;
  nextDecoX = 400;
  nextCloudX = 0;
  nextTreeX = 0;
  nextBuildingX = 200;
  nextCindyScore = 1500;
  initWorld();
}

function update() {
  if (state !== 'playing') return;
  frameCount++;

  // timers
  if (invincibleTimer > 0) invincibleTimer--;
  if (respawnTimer > 0) respawnTimer--;

  // difficulty (ramps slowly)
  difficultyLevel = Math.floor(score / 800);
  scrollSpeed = SCROLL_SPEED_BASE + difficultyLevel * 0.15;
  scrollX += scrollSpeed;
  score += 1;

  // player horizontal
  if (respawnTimer <= 0) {
    if (keys['ArrowRight'] || keys['d']) player.x += 2;
    if (keys['ArrowLeft'] || keys['a']) player.x -= 2;
  }
  player.x = Math.max(scrollX + 40, Math.min(scrollX + W * 0.6, player.x));
  player.x += scrollSpeed;

  // gravity
  player.vy += GRAVITY;
  player.y += player.vy;

  // landing on bushes
  player.onGround = false;
  player.onBush = null;
  for (const b of bushes) {
    const bushTop = b.y - b.h;
    const bushLeft = b.x;
    const bushRight = b.x + b.w;
    const playerBottom = player.y + player.h;
    const playerCX = player.x + player.w / 2;

    if (player.vy >= 0 &&
        playerCX > bushLeft - 8 && playerCX < bushRight + 8 &&
        playerBottom >= bushTop - 4 && playerBottom <= bushTop + 20) {
      player.y = bushTop - player.h;
      player.vy = 0;
      player.onGround = true;
      player.onBush = b;
      if (player.jumping) {
        player.jumping = false;
        player.landedBushes++;
        score += 50 * player.landedBushes;
        spawnParticles(player.x + 11, player.y + player.h, COL.bushLight, 6);
      }
      break;
    }
  }

  // ground collision = lose a life (with grace period)
  if (player.y + player.h >= GROUND_Y) {
    player.y = GROUND_Y - player.h;
    player.vy = 0;
    player.onGround = true;
    player.jumping = false;
    player.landedBushes = 0;
    // grace period: you have ~0.5 seconds to jump off before losing a life
    if (invincibleTimer <= 0) {
      groundGraceTimer++;
      if (groundGraceTimer > 30) {
        loseLife();
        groundGraceTimer = 0;
      }
    }
  } else {
    groundGraceTimer = 0;
  }

  // fell off screen left = instant death
  if (player.x < scrollX - 30) {
    lives = 0;
    state = 'gameover';
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('bushrun_hi', highScore.toString());
    }
  }

  // screen shake
  if (shakeTimer > 0) {
    shakeTimer--;
    shakeX = (Math.random() - 0.5) * 6;
    shakeY = (Math.random() - 0.5) * 6;
  } else {
    shakeX = 0; shakeY = 0;
  }

  // deco people animation
  for (const d of decorPeople) {
    d.walkFrame += 0.08;
  }

  extendWorld();
  updateParticles();
}

// ---------- drawing ----------
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, COL.sky1);
  grad.addColorStop(0.5, COL.sky2);
  grad.addColorStop(1, COL.sky3);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawClouds(camX) {
  ctx.fillStyle = COL.cloud;
  for (const c of clouds) {
    const sx = c.x - camX * 0.3 + Math.sin(frameCount * 0.005 + c.x) * 5;
    const sy = c.y;
    if (sx > W + 100 || sx + c.w < -100) continue;
    ctx.beginPath();
    ctx.ellipse(sx + c.w / 2, sy + c.h / 2, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(sx + c.w * 0.3, sy + c.h * 0.4, c.w * 0.3, c.h * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(sx + c.w * 0.7, sy + c.h * 0.5, c.w * 0.25, c.h * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBgBuildings(camX) {
  for (const b of bgBuildings) {
    const sx = b.x - camX * 0.4;
    if (sx > W + 100 || sx + b.bw < -100) continue;
    const by = GROUND_Y - b.bh;
    ctx.fillStyle = COL.buildingDark;
    ctx.fillRect(sx, by, b.bw, b.bh);
    ctx.fillStyle = COL.building;
    ctx.fillRect(sx + 2, by + 2, b.bw - 4, b.bh - 2);
    ctx.fillStyle = COL.roof;
    ctx.fillRect(sx - 3, by - 4, b.bw + 6, 6);
    for (let wy = 0; wy < 3; wy++) {
      for (let wx = 0; wx < 2; wx++) {
        const lit = Math.sin(b.x + wx * 3 + wy * 7 + frameCount * 0.01) > 0;
        ctx.fillStyle = lit ? COL.window : COL.windowOff;
        ctx.fillRect(sx + 6 + wx * (b.bw / 2 - 4), by + 8 + wy * 14, 8, 8);
      }
    }
  }
}

function drawBgTrees(camX) {
  for (const t of bgTrees) {
    const sx = t.x - camX * 0.5;
    if (sx > W + 60 || sx < -60) continue;
    const s = t.scale;
    const ty = GROUND_Y;
    ctx.fillStyle = COL.trunk;
    ctx.fillRect(sx + 6 * s, ty - 30 * s, 8 * s, 30 * s);
    ctx.fillStyle = COL.leavesDark;
    ctx.beginPath();
    ctx.ellipse(sx + 10 * s, ty - 35 * s, 18 * s, 18 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = COL.leaves;
    ctx.beginPath();
    ctx.ellipse(sx + 8 * s, ty - 40 * s, 14 * s, 14 * s, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGround(camX) {
  // danger zone coloring when low on lives
  if (lives <= 1 && lives > 0) {
    ctx.fillStyle = 'rgba(255,50,50,0.15)';
    ctx.fillRect(0, GROUND_Y - 5, W, 5);
  }
  ctx.fillStyle = COL.grass1;
  ctx.fillRect(0, GROUND_Y, W, 8);
  ctx.fillStyle = COL.grass2;
  for (let gx = 0; gx < W; gx += 16) {
    const offset = (gx + Math.floor(camX)) % 32;
    if (offset < 16) ctx.fillRect(gx, GROUND_Y, 8, 4);
  }
  ctx.fillStyle = COL.dirt;
  ctx.fillRect(0, GROUND_Y + 8, W, 20);
  ctx.fillStyle = COL.dirtDark;
  ctx.fillRect(0, GROUND_Y + 28, W, H - GROUND_Y - 28);
  ctx.fillStyle = COL.path;
  ctx.fillRect(0, GROUND_Y + 2, W, 6);
}

function drawBush(b, camX) {
  const sx = b.x - camX;
  const sy = b.y - b.h;
  if (sx > W + 60 || sx + b.w < -60) return;

  ctx.fillStyle = COL.shadow;
  ctx.beginPath();
  ctx.ellipse(sx + b.w / 2, b.y + 2, b.w / 2 + 4, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = COL.bush;
  ctx.beginPath();
  ctx.ellipse(sx + b.w / 2, sy + b.h / 2, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = COL.bushLight;
  ctx.beginPath();
  ctx.ellipse(sx + b.w / 2 - 5, sy + b.h / 2 - 5, b.w / 3, b.h / 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = COL.bushDark;
  ctx.beginPath();
  ctx.ellipse(sx + b.w / 2 + 4, sy + b.h / 2 + 6, b.w / 3, b.h / 4, 0, 0, Math.PI * 2);
  ctx.fill();

  if (b.hasFlower) {
    ctx.fillStyle = COL.bushFlower;
    ctx.fillRect(sx + b.w / 2 + 3, sy + b.h / 2 - 8, 5, 5);
    ctx.fillRect(sx + b.w / 2 - 8, sy + b.h / 2 + 2, 4, 4);
  }
}

function drawCharacter(sx, sy, w, h, style, walkFrame, dir) {
  const big = style.big;
  const bw = big ? 30 : 22;
  const bh = big ? 36 : 28;
  const legOffset = Math.sin(walkFrame) * 3;

  ctx.fillStyle = COL.shadow;
  ctx.beginPath();
  ctx.ellipse(sx + bw / 2, sy + bh, bw / 2 + 2, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#404060';
  ctx.fillRect(sx + 4, sy + bh - 10 + legOffset, 5, 10);
  ctx.fillRect(sx + bw - 9, sy + bh - 10 - legOffset, 5, 10);

  ctx.fillStyle = style.shirt;
  ctx.fillRect(sx + 2, sy + 8, bw - 4, bh - 16);

  ctx.fillStyle = style.skin;
  const headW = big ? 14 : 12;
  const headH = big ? 12 : 10;
  ctx.fillRect(sx + (bw - headW) / 2, sy, headW, headH);

  ctx.fillStyle = style.hair;
  if (style.female) {
    ctx.fillRect(sx + (bw - headW) / 2 - 1, sy - 2, headW + 2, 5);
    ctx.fillRect(sx + (bw - headW) / 2 - 2, sy, 3, headH);
    ctx.fillRect(sx + (bw + headW) / 2 - 1, sy, 3, headH);
  } else {
    ctx.fillRect(sx + (bw - headW) / 2, sy - 2, headW, 4);
  }

  ctx.fillStyle = style.shades ? '#101010' : '#202020';
  const eyeY = sy + 4;
  const eyeSize = style.shades ? 4 : 2;
  ctx.fillRect(sx + bw / 2 - 4, eyeY, eyeSize, style.shades ? 3 : 2);
  ctx.fillRect(sx + bw / 2 + 2, eyeY, eyeSize, style.shades ? 3 : 2);
  if (style.shades) ctx.fillRect(sx + bw / 2 - 5, eyeY, 12, 2);

  ctx.fillStyle = style.skin;
  ctx.fillRect(sx - 2, sy + 10 - legOffset, 4, 10);
  ctx.fillRect(sx + bw - 2, sy + 10 + legOffset, 4, 10);
}

function drawBrokenHeart(cx, cy, scale) {
  const s = scale || 1;
  ctx.fillStyle = COL.heart;
  ctx.fillRect(cx - 7 * s, cy, 5 * s, 5 * s);
  ctx.fillRect(cx - 8 * s, cy + 2 * s, 6 * s, 4 * s);
  ctx.fillRect(cx - 6 * s, cy + 6 * s, 4 * s, 3 * s);
  ctx.fillRect(cx - 4 * s, cy + 9 * s, 2 * s, 2 * s);
  ctx.fillRect(cx + 2 * s, cy, 5 * s, 5 * s);
  ctx.fillRect(cx + 2 * s, cy + 2 * s, 6 * s, 4 * s);
  ctx.fillRect(cx + 2 * s, cy + 6 * s, 4 * s, 3 * s);
  ctx.fillRect(cx + 2 * s, cy + 9 * s, 2 * s, 2 * s);
  ctx.fillStyle = COL.heartCrack;
  ctx.fillRect(cx - 1 * s, cy - 1 * s, 2 * s, 13 * s);
  ctx.fillRect(cx - 2 * s, cy + 3 * s, 2 * s, 2 * s);
  ctx.fillRect(cx + 1 * s, cy + 6 * s, 2 * s, 2 * s);
}

function drawCindyLabel(sx, sy, bw) {
  const labelX = sx + bw / 2;
  const labelY = sy - 30;
  const bobY = Math.sin(frameCount * 0.06) * 3;

  drawBrokenHeart(labelX, labelY - 18 + bobY, 1.2);

  const textW = 50;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(labelX - textW / 2 - 2, labelY + bobY - 2, textW + 4, 16);
  ctx.strokeStyle = '#ff69b4';
  ctx.lineWidth = 1;
  ctx.strokeRect(labelX - textW / 2 - 2, labelY + bobY - 2, textW + 4, 16);

  ctx.fillStyle = '#ff69b4';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('CINDY', labelX, labelY + bobY + 10);

  ctx.fillStyle = '#ff6688';
  ctx.font = 'bold 8px monospace';
  ctx.fillText('\u2764\u200D\u{1FA79}', labelX, labelY + bobY + 22);
}

function drawDecoCharacter(d, camX) {
  const sx = d.x - camX;
  if (sx > W + 60 || sx < -60) return;

  drawCharacter(sx, d.y, d.w, d.h, d.style, d.walkFrame, d.dir);

  if (d.isCindy) {
    drawCindyLabel(sx, d.y, d.w);
  } else {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(d.name, sx + d.w / 2, d.y - 4);
    ctx.fillStyle = '#ddd';
    ctx.fillText(d.name, sx + d.w / 2 - 1, d.y - 5);
  }
}

function drawPlayer(camX) {
  const px = player.x - camX;
  const py = player.y;
  if (px > W + 30 || px < -30) return;

  // invincibility flash
  if (invincibleTimer > 0 && Math.floor(frameCount / 3) % 2 === 0) return;

  const walking = player.onGround && (keys['ArrowLeft'] || keys['ArrowRight'] || keys['a'] || keys['d']);
  const walkF = walking ? frameCount * 0.3 : 0;
  const legOff = Math.sin(walkF) * 3;

  ctx.fillStyle = COL.shadow;
  ctx.beginPath();
  ctx.ellipse(px + 11, GROUND_Y + 2, 13, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  const scaleY = player.vy < -5 ? 0.85 : (player.vy > 5 ? 1.15 : 1);

  ctx.save();
  ctx.translate(px + 11, py + player.h);
  ctx.scale(1, scaleY);
  ctx.translate(-(px + 11), -(py + player.h));

  ctx.fillStyle = '#305090';
  const lOff = player.onGround ? legOff : 3;
  ctx.fillRect(px + 4, py + 20 + lOff, 5, 10);
  ctx.fillRect(px + 13, py + 20 - lOff, 5, 10);

  ctx.fillStyle = COL.player;
  ctx.fillRect(px + 2, py + 8, 18, 14);

  ctx.fillStyle = '#c04040';
  ctx.fillRect(px - 1, py + 10, 4, 10);

  ctx.fillStyle = COL.playerSkin;
  ctx.fillRect(px + 5, py, 12, 10);

  ctx.fillStyle = COL.playerHair;
  ctx.fillRect(px + 4, py - 2, 14, 4);

  ctx.fillStyle = '#fff';
  ctx.fillRect(px + 7, py + 3, 3, 3);
  ctx.fillRect(px + 13, py + 3, 3, 3);
  ctx.fillStyle = '#000';
  ctx.fillRect(px + 8, py + 4, 2, 2);
  ctx.fillRect(px + 14, py + 4, 2, 2);

  ctx.fillStyle = COL.playerSkin;
  ctx.fillRect(px - 2, py + 10 + lOff * 0.5, 4, 8);
  ctx.fillRect(px + 20, py + 10 - lOff * 0.5, 4, 8);

  ctx.restore();
}

function drawParticles(camX) {
  for (const p of particles) {
    const alpha = Math.min(1, p.life / 15);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - camX, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawHeart(x, y, filled) {
  ctx.fillStyle = filled ? COL.heart : 'rgba(255,255,255,0.15)';
  // pixel heart
  ctx.fillRect(x, y + 1, 6, 6);
  ctx.fillRect(x + 8, y + 1, 6, 6);
  ctx.fillRect(x - 1, y + 4, 7, 4);
  ctx.fillRect(x + 8, y + 4, 7, 4);
  ctx.fillRect(x + 1, y + 8, 12, 3);
  ctx.fillRect(x + 3, y + 11, 8, 2);
  ctx.fillRect(x + 5, y + 13, 4, 1);
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, 30);

  ctx.fillStyle = COL.score;
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 10, 20);

  // lives as hearts (centered)
  const heartsWidth = MAX_LIVES * 22;
  for (let i = 0; i < MAX_LIVES; i++) {
    drawHeart(W / 2 - heartsWidth / 2 + i * 22, 6, i < lives);
  }

  ctx.fillStyle = '#aaa';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`HI: ${highScore}`, W - 10, 20);

  // bush combo
  if (player.landedBushes > 1) {
    ctx.fillStyle = COL.bushLight;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`BUSH COMBO x${player.landedBushes}!`, W / 2, 50);
  }

  // ground warning - flashing "JUMP!" when on ground with grace timer
  if (groundGraceTimer > 0 && state === 'playing') {
    const urgency = groundGraceTimer / 30;
    ctx.fillStyle = `rgba(255,0,0,${0.1 + urgency * 0.2})`;
    ctx.fillRect(0, GROUND_Y - 20, W, 20);
    ctx.fillStyle = '#ff4040';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('JUMP! GET BACK ON A BUSH!', W / 2, GROUND_Y - 30);
    // danger bar
    ctx.fillStyle = 'rgba(255,0,0,0.5)';
    ctx.fillRect(W / 2 - 60, GROUND_Y - 24, 120 * urgency, 6);
    ctx.strokeStyle = '#ff6060';
    ctx.lineWidth = 1;
    ctx.strokeRect(W / 2 - 60, GROUND_Y - 24, 120, 6);
  }

  // warning when low on lives
  if (lives === 1 && frameCount % 60 < 30) {
    ctx.fillStyle = '#ff4040';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('LAST LIFE! STAY ON THE BUSHES!', W / 2, H - 75);
  }

  // hint at start
  const isMobile = window.matchMedia('(pointer: coarse)').matches;
  if (player.onGround && score < 200) {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    if (isMobile) {
      ctx.fillText('TAP JUMP to hop between bushes!', W / 2, H - 75);
    } else {
      ctx.fillText('SPACE / UP to JUMP between bushes!', W / 2, H - 75);
    }
  }
}

function drawTextOutline(text, x, y, size, color, outlineColor) {
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillStyle = outlineColor || '#000';
  for (let dx = -2; dx <= 2; dx++) {
    for (let dy = -2; dy <= 2; dy++) {
      if (dx || dy) ctx.fillText(text, x + dx, y + dy);
    }
  }
  ctx.fillStyle = color || COL.text;
  ctx.fillText(text, x, y);
}

function drawTitleScreen() {
  drawSky();
  const fakeScroll = frameCount * 1.5;

  for (let i = 0; i < 6; i++) {
    const tx = (i * 120 - fakeScroll * 0.3) % 720 + 60;
    ctx.fillStyle = COL.trunk;
    ctx.fillRect(tx + 6, GROUND_Y - 25, 6, 25);
    ctx.fillStyle = COL.leaves;
    ctx.beginPath();
    ctx.ellipse(tx + 9, GROUND_Y - 30, 14, 14, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = COL.grass1;
  ctx.fillRect(0, GROUND_Y, W, 8);
  ctx.fillStyle = COL.dirt;
  ctx.fillRect(0, GROUND_Y + 8, W, H - GROUND_Y - 8);

  for (let i = 0; i < 8; i++) {
    const bx = ((i * 90 - fakeScroll * 0.8) % 800 + 800) % 800 - 40;
    drawBush({ x: bx + fakeScroll * 0.8, y: GROUND_Y, w: 55, h: 32, hasFlower: i % 3 === 0, elevation: 0 }, fakeScroll * 0.8);
  }

  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(W / 2 - 190, 40, 380, 260);
  ctx.strokeStyle = COL.bushLight;
  ctx.lineWidth = 3;
  ctx.strokeRect(W / 2 - 190, 40, 380, 260);

  drawTextOutline('BUSHRUN', W / 2, 95, 48, COL.bushLight, '#1a3a1a');

  ctx.fillStyle = COL.score;
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SIDE-SCROLLING CAMPUS EDITION', W / 2, 118);

  ctx.fillStyle = '#ccc';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('Jump from bush to bush!', W / 2, 148);
  ctx.fillText('Touch the ground and you lose a life.', W / 2, 166);

  // draw 5 hearts to show lives concept
  for (let i = 0; i < 5; i++) drawHeart(W / 2 - 52 + i * 22, 178, true);

  const isMobile = window.matchMedia('(pointer: coarse)').matches;
  ctx.fillStyle = '#aaa';
  ctx.font = 'bold 11px monospace';
  if (isMobile) {
    ctx.fillText('Use the on-screen buttons to play', W / 2, 210);
  } else {
    ctx.fillText('SPACE / UP to jump, LEFT / RIGHT to adjust', W / 2, 210);
  }

  if (Math.floor(frameCount / 30) % 2 === 0) {
    ctx.fillStyle = COL.text;
    ctx.font = 'bold 14px monospace';
    ctx.fillText(isMobile ? 'TAP TO START' : 'PRESS SPACE OR ENTER', W / 2, 250);
  }

  if (highScore > 0) {
    ctx.fillStyle = COL.score;
    ctx.font = 'bold 12px monospace';
    ctx.fillText(`HIGH SCORE: ${highScore}`, W / 2, 280);
  }

  frameCount++;
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(W / 2 - 160, 70, 320, 250);
  ctx.strokeStyle = '#e04060';
  ctx.lineWidth = 3;
  ctx.strokeRect(W / 2 - 160, 70, 320, 250);

  drawTextOutline('GAME OVER', W / 2, 125, 36, '#e04060', '#400010');

  ctx.fillStyle = COL.score;
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`SCORE: ${score}`, W / 2, 165);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#f0e060';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('NEW HIGH SCORE!', W / 2, 195);
  }

  ctx.fillStyle = '#aaa';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(`HIGH SCORE: ${highScore}`, W / 2, 225);

  // best combo
  ctx.fillStyle = COL.bushLight;
  ctx.font = 'bold 12px monospace';
  ctx.fillText(`Best bush combo: x${player.landedBushes || 0}`, W / 2, 255);

  const isMobile = window.matchMedia('(pointer: coarse)').matches;
  if (Math.floor(frameCount / 30) % 2 === 0) {
    ctx.fillStyle = COL.text;
    ctx.font = 'bold 13px monospace';
    ctx.fillText(isMobile ? 'TAP TO PLAY AGAIN' : 'PRESS SPACE TO PLAY AGAIN', W / 2, 295);
  }

  frameCount++;
}

// ---------- main render ----------
function render() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  if (state === 'title') {
    drawTitleScreen();
    ctx.restore();
    return;
  }

  const camX = scrollX;

  drawSky();
  drawClouds(camX);
  drawBgBuildings(camX);
  drawBgTrees(camX);
  drawGround(camX);

  for (const b of bushes) drawBush(b, camX);

  const sortedDeco = [...decorPeople].sort((a, b) => a.y - b.y);
  for (const d of sortedDeco) drawDecoCharacter(d, camX);

  drawPlayer(camX);
  drawParticles(camX);
  drawHUD();

  if (state === 'gameover') drawGameOverScreen();

  ctx.restore();
}

function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
