<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUSHRUN</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: monospace;
    overflow: hidden;
  }
  canvas {
    border: 4px solid #e94560;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="game" width="512" height="512"></canvas>
<script>
// ============================================================
//  BUSHRUN - An 8-bit campus bush-skipping adventure
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ---------- constants ----------
const TILE = 32;
const COLS = canvas.width / TILE;   // 16
const ROWS = canvas.height / TILE;  // 16
const SCROLL_SPEED_BASE = 1.8;
const PLAYER_SPEED = 3.5;

// ---------- colors (8-bit palette) ----------
const COL = {
  grass1: '#4a8c3f',
  grass2: '#5a9c4f',
  path:   '#c8b88a',
  pathEdge: '#b0a070',
  bush:   '#2d6e2d',
  bushLight: '#3a8a3a',
  bushDark: '#1a4e1a',
  bushFlower: '#e8e850',
  player: '#3070d0',
  playerSkin: '#f0c090',
  playerHair: '#604020',
  obstacle: '#d04040',
  sky:    '#70b8e8',
  building: '#8888a0',
  buildingDark: '#686880',
  roof:   '#a05050',
  window: '#f0e870',
  windowOff: '#606880',
  trunk:  '#806040',
  leaves: '#308030',
  leavesDark: '#206820',
  text:   '#ffffff',
  score:  '#f0e060',
  heart:  '#e04060',
  shadow: 'rgba(0,0,0,0.18)',
};

// ---------- obstacle names ----------
const OBSTACLE_NAMES = [
  'Phil', 'Bud', 'Mark', 'Big Mike', 'Nate Dogg',
  'Marla', 'Hot Debbie', 'Box-out Becky', 'Cindy', 'Marla'
];

// Color/style per character so they look distinct
const CHAR_STYLES = {
  'Phil':           { shirt: '#d04040', hair: '#604020', skin: '#f0c090' },
  'Bud':            { shirt: '#40a040', hair: '#303030', skin: '#e0b080' },
  'Mark':           { shirt: '#4040c0', hair: '#806040', skin: '#f0c090' },
  'Big Mike':       { shirt: '#c06000', hair: '#202020', skin: '#a07050', big: true },
  'Nate Dogg':      { shirt: '#808080', hair: '#101010', skin: '#8b6040', shades: true },
  'Marla':          { shirt: '#c040c0', hair: '#d0a020', skin: '#f0c090', female: true },
  'Hot Debbie':     { shirt: '#e04080', hair: '#d06020', skin: '#f0c890', female: true },
  'Box-out Becky':  { shirt: '#e08020', hair: '#604020', skin: '#f0c090', female: true, big: true },
  'Cindy':          { shirt: '#ff69b4', hair: '#301010', skin: '#f0c090', female: true, heart: true },
};

// ---------- game state ----------
let state = 'title'; // title | playing | gameover
let score = 0;
let highScore = parseInt(localStorage.getItem('bushrun_hi') || '0');
let lives = 3;
let scrollY = 0;
let scrollSpeed = SCROLL_SPEED_BASE;
let invincibleTimer = 0;
let frameCount = 0;
let difficultyLevel = 0;
let shakeTimer = 0;
let shakeX = 0;
let shakeY = 0;

// player
const player = { x: 256, y: 400, w: 22, h: 28, inBush: false, hidden: false, bushTimer: 0 };

// world rows (generated procedurally)
let worldRows = [];
let bushes = [];
let obstacles = [];
let particles = [];
let decorations = []; // background campus decorations

// ---------- input ----------
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (state === 'title' && (e.key === ' ' || e.key === 'Enter')) startGame();
  if (state === 'gameover' && (e.key === ' ' || e.key === 'Enter')) startGame();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// touch/mobile support
let touchStartX = null, touchStartY = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'title' || state === 'gameover') { startGame(); return; }
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchStartX) return;
  const t = e.touches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  keys['ArrowLeft'] = dx < -15;
  keys['ArrowRight'] = dx > 15;
  keys['ArrowUp'] = dy < -15;
  keys['ArrowDown'] = dy > 15;
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchStartX = null;
  keys['ArrowLeft'] = false;
  keys['ArrowRight'] = false;
  keys['ArrowUp'] = false;
  keys['ArrowDown'] = false;
});

// ---------- procedural generation ----------
function generateRow(worldY) {
  // path runs roughly down the middle with some wander
  const pathCenter = 8 + Math.sin(worldY * 0.03) * 3;
  const pathWidth = 3;
  const row = [];
  for (let x = 0; x < COLS; x++) {
    const dist = Math.abs(x - pathCenter);
    if (dist < pathWidth) row.push('path');
    else if (dist < pathWidth + 0.5) row.push('pathEdge');
    else row.push('grass');
  }
  return row;
}

function spawnBush(worldY) {
  const pathCenter = 8 + Math.sin(worldY * 0.03) * 3;
  // place bushes along the sides of the path
  const side = Math.random() < 0.5 ? -1 : 1;
  const offset = 3.5 + Math.random() * 4;
  const bx = (pathCenter + side * offset) * TILE;
  if (bx < TILE || bx > canvas.width - 2 * TILE) return null;
  return {
    x: bx, y: worldY * TILE,
    w: 36 + Math.random() * 16,
    h: 30 + Math.random() * 12,
    hasFlower: Math.random() < 0.3,
  };
}

function spawnObstacle(worldY) {
  const pathCenter = 8 + Math.sin(worldY * 0.03) * 3;
  const name = OBSTACLE_NAMES[Math.floor(Math.random() * OBSTACLE_NAMES.length)];
  const style = CHAR_STYLES[name] || CHAR_STYLES['Phil'];
  // obstacles walk on or near the path
  const ox = (pathCenter + (Math.random() - 0.5) * 6) * TILE;
  const speed = (Math.random() - 0.5) * 1.5;
  return {
    x: ox, y: worldY * TILE,
    w: style.big ? 30 : 22,
    h: style.big ? 36 : 28,
    name, style,
    vx: speed,
    dir: speed > 0 ? 1 : -1,
    walkFrame: Math.random() * Math.PI * 2,
  };
}

function spawnDecoration(worldY) {
  const side = Math.random() < 0.5 ? 0 : 1;
  const x = side === 0 ? Math.random() * 80 : canvas.width - 80 + Math.random() * 60;
  const type = Math.random() < 0.4 ? 'tree' : (Math.random() < 0.5 ? 'building' : 'lamppost');
  return { x, y: worldY * TILE, type };
}

function initWorld() {
  worldRows = [];
  bushes = [];
  obstacles = [];
  particles = [];
  decorations = [];
  for (let r = 0; r < 40; r++) {
    worldRows.push(generateRow(r));
    if (r > 5 && Math.random() < 0.5) {
      const b = spawnBush(r);
      if (b) bushes.push(b);
    }
    if (r > 8 && Math.random() < 0.3) {
      obstacles.push(spawnObstacle(r));
    }
    if (r % 4 === 0) {
      decorations.push(spawnDecoration(r));
    }
  }
}

let nextRowY = 40;

function extendWorld() {
  const threshold = scrollY / TILE + ROWS + 10;
  while (nextRowY < threshold) {
    worldRows.push(generateRow(nextRowY));
    if (Math.random() < 0.45) {
      const b = spawnBush(nextRowY);
      if (b) bushes.push(b);
    }
    // difficulty increases over time
    const obChance = Math.min(0.45, 0.25 + difficultyLevel * 0.02);
    if (Math.random() < obChance) {
      obstacles.push(spawnObstacle(nextRowY));
    }
    if (nextRowY % 4 === 0) {
      decorations.push(spawnDecoration(nextRowY));
    }
    nextRowY++;
  }
  // cleanup old objects
  const cutoff = scrollY - 200;
  bushes = bushes.filter(b => b.y > cutoff);
  obstacles = obstacles.filter(o => o.y > cutoff);
  decorations = decorations.filter(d => d.y > cutoff);
}

// ---------- drawing helpers ----------
function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

function drawText(text, x, y, size, color, align) {
  ctx.fillStyle = color || COL.text;
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = align || 'center';
  ctx.fillText(text, x, y);
}

function drawTextOutline(text, x, y, size, color, outlineColor) {
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillStyle = outlineColor || '#000';
  for (let dx = -2; dx <= 2; dx++) {
    for (let dy = -2; dy <= 2; dy++) {
      if (dx || dy) ctx.fillText(text, x + dx, y + dy);
    }
  }
  ctx.fillStyle = color || COL.text;
  ctx.fillText(text, x, y);
}

// ---------- sprite drawing ----------
function drawBush(b, camY) {
  const sx = b.x, sy = b.y - camY;
  if (sy < -60 || sy > canvas.height + 20) return;
  // shadow
  ctx.fillStyle = COL.shadow;
  ctx.beginPath();
  ctx.ellipse(sx + b.w / 2, sy + b.h - 2, b.w / 2 + 4, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  // main bush body
  ctx.fillStyle = COL.bush;
  ctx.beginPath();
  ctx.ellipse(sx + b.w / 2, sy + b.h / 2, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
  ctx.fill();
  // highlight
  ctx.fillStyle = COL.bushLight;
  ctx.beginPath();
  ctx.ellipse(sx + b.w / 2 - 4, sy + b.h / 2 - 5, b.w / 3, b.h / 3, 0, 0, Math.PI * 2);
  ctx.fill();
  // dark underside
  ctx.fillStyle = COL.bushDark;
  ctx.beginPath();
  ctx.ellipse(sx + b.w / 2 + 3, sy + b.h / 2 + 6, b.w / 3, b.h / 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // flower
  if (b.hasFlower) {
    ctx.fillStyle = COL.bushFlower;
    ctx.fillRect(sx + b.w / 2 + 2, sy + b.h / 2 - 8, 5, 5);
    ctx.fillRect(sx + b.w / 2 - 6, sy + b.h / 2 + 2, 4, 4);
  }
}

function drawCharacter(x, y, w, h, style, walkFrame, dir, name) {
  const big = style.big;
  const bw = big ? 30 : 22;
  const bh = big ? 36 : 28;
  const cx = x, cy = y;

  // walking animation
  const legOffset = Math.sin(walkFrame) * 3;

  // shadow
  ctx.fillStyle = COL.shadow;
  ctx.beginPath();
  ctx.ellipse(cx + bw / 2, cy + bh, bw / 2 + 2, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // legs
  ctx.fillStyle = '#404060';
  ctx.fillRect(cx + 4, cy + bh - 10 + legOffset, 5, 10);
  ctx.fillRect(cx + bw - 9, cy + bh - 10 - legOffset, 5, 10);

  // body/shirt
  ctx.fillStyle = style.shirt;
  ctx.fillRect(cx + 2, cy + 8, bw - 4, bh - 16);

  // head
  ctx.fillStyle = style.skin;
  const headW = big ? 14 : 12;
  const headH = big ? 12 : 10;
  ctx.fillRect(cx + (bw - headW) / 2, cy, headW, headH);

  // hair
  ctx.fillStyle = style.hair;
  if (style.female) {
    ctx.fillRect(cx + (bw - headW) / 2 - 1, cy - 2, headW + 2, 5);
    ctx.fillRect(cx + (bw - headW) / 2 - 2, cy, 3, headH);
    ctx.fillRect(cx + (bw + headW) / 2 - 1, cy, 3, headH);
  } else {
    ctx.fillRect(cx + (bw - headW) / 2, cy - 2, headW, 4);
  }

  // eyes
  ctx.fillStyle = style.shades ? '#101010' : '#202020';
  const eyeY = cy + 4;
  const eyeSize = style.shades ? 4 : 2;
  ctx.fillRect(cx + bw / 2 - 4, eyeY, eyeSize, style.shades ? 3 : 2);
  ctx.fillRect(cx + bw / 2 + 2, eyeY, eyeSize, style.shades ? 3 : 2);
  if (style.shades) {
    ctx.fillRect(cx + bw / 2 - 5, eyeY, 12, 2);
  }

  // arms
  ctx.fillStyle = style.skin;
  ctx.fillRect(cx - 2, cy + 10 - legOffset, 4, 10);
  ctx.fillRect(cx + bw - 2, cy + 10 + legOffset, 4, 10);

  // Cindy's floating broken heart
  if (style.heart) {
    const hx = cx + bw / 2;
    const hy = cy - 12 + Math.sin(frameCount * 0.08) * 3;
    ctx.fillStyle = COL.heart;
    ctx.fillRect(hx - 5, hy, 4, 4);
    ctx.fillRect(hx + 1, hy, 4, 4);
    ctx.fillRect(hx - 6, hy + 2, 5, 3);
    ctx.fillRect(hx + 1, hy + 2, 5, 3);
    ctx.fillRect(hx - 4, hy + 5, 3, 2);
    ctx.fillRect(hx + 1, hy + 5, 3, 2);
    // crack
    ctx.fillStyle = '#000';
    ctx.fillRect(hx - 1, hy, 2, 8);
  }
}

function drawPlayer(camY) {
  const px = player.x, py = player.y - camY;
  if (player.hidden) {
    // show little eyes poking out of bush
    if (frameCount % 30 < 20) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(px + 8, py + 6, 3, 2);
      ctx.fillRect(px + 14, py + 6, 3, 2);
      ctx.fillStyle = '#000';
      ctx.fillRect(px + 9, py + 7, 2, 1);
      ctx.fillRect(px + 15, py + 7, 2, 1);
    }
    return;
  }

  // invincibility flash
  if (invincibleTimer > 0 && Math.floor(frameCount / 3) % 2 === 0) return;

  const walkF = (keys['ArrowLeft'] || keys['ArrowRight'] || keys['ArrowUp'] || keys['ArrowDown'])
    ? frameCount * 0.3 : 0;
  const legOff = Math.sin(walkF) * 3;

  // shadow
  ctx.fillStyle = COL.shadow;
  ctx.beginPath();
  ctx.ellipse(px + 11, py + 28, 13, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // legs
  ctx.fillStyle = '#305090';
  ctx.fillRect(px + 4, py + 20 + legOff, 5, 10);
  ctx.fillRect(px + 13, py + 20 - legOff, 5, 10);

  // body
  ctx.fillStyle = COL.player;
  ctx.fillRect(px + 2, py + 8, 18, 14);

  // backpack
  ctx.fillStyle = '#c04040';
  ctx.fillRect(px - 1, py + 10, 4, 10);

  // head
  ctx.fillStyle = COL.playerSkin;
  ctx.fillRect(px + 5, py, 12, 10);

  // hair
  ctx.fillStyle = COL.playerHair;
  ctx.fillRect(px + 4, py - 2, 14, 4);

  // eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(px + 7, py + 3, 3, 3);
  ctx.fillRect(px + 13, py + 3, 3, 3);
  ctx.fillStyle = '#000';
  ctx.fillRect(px + 8, py + 4, 2, 2);
  ctx.fillRect(px + 14, py + 4, 2, 2);

  // arms
  ctx.fillStyle = COL.playerSkin;
  ctx.fillRect(px - 2, py + 10 + legOff * 0.5, 4, 8);
  ctx.fillRect(px + 20, py + 10 - legOff * 0.5, 4, 8);
}

function drawTree(x, y) {
  ctx.fillStyle = COL.trunk;
  ctx.fillRect(x + 8, y + 20, 8, 20);
  ctx.fillStyle = COL.leavesDark;
  ctx.beginPath();
  ctx.ellipse(x + 12, y + 12, 18, 18, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = COL.leaves;
  ctx.beginPath();
  ctx.ellipse(x + 10, y + 8, 14, 14, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawBuilding(x, y) {
  const bw = 50, bh = 60;
  ctx.fillStyle = COL.buildingDark;
  ctx.fillRect(x, y, bw, bh);
  ctx.fillStyle = COL.building;
  ctx.fillRect(x + 2, y + 2, bw - 4, bh - 2);
  // roof
  ctx.fillStyle = COL.roof;
  ctx.fillRect(x - 3, y - 4, bw + 6, 8);
  // windows
  for (let wy = 0; wy < 3; wy++) {
    for (let wx = 0; wx < 2; wx++) {
      const lit = Math.sin((x + wx) * 3 + wy * 7 + frameCount * 0.01) > 0;
      ctx.fillStyle = lit ? COL.window : COL.windowOff;
      ctx.fillRect(x + 8 + wx * 20, y + 10 + wy * 16, 10, 10);
    }
  }
}

function drawLamppost(x, y) {
  ctx.fillStyle = '#606060';
  ctx.fillRect(x + 3, y + 4, 4, 30);
  ctx.fillRect(x, y + 30, 10, 4);
  // light glow
  ctx.fillStyle = 'rgba(255,240,180,0.15)';
  ctx.beginPath();
  ctx.ellipse(x + 5, y + 4, 14, 14, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#f0e880';
  ctx.fillRect(x + 1, y, 8, 6);
}

// ---------- particles ----------
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 20 + Math.random() * 20,
      color: color,
      size: 2 + Math.random() * 3,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles(camY) {
  particles.forEach(p => {
    const alpha = Math.min(1, p.life / 15);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y - camY, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

// ---------- collision ----------
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ---------- game logic ----------
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  scrollY = 0;
  scrollSpeed = SCROLL_SPEED_BASE;
  invincibleTimer = 0;
  difficultyLevel = 0;
  shakeTimer = 0;
  player.x = 240;
  player.y = 400;
  player.hidden = false;
  player.inBush = false;
  player.bushTimer = 0;
  nextRowY = 40;
  initWorld();
}

function hitObstacle(ob) {
  if (invincibleTimer > 0 || player.hidden) return;
  lives--;
  invincibleTimer = 90;
  shakeTimer = 15;
  spawnParticles(player.x + 11, player.y + 14, '#ff4040', 12);

  if (ob.name === 'Cindy') {
    spawnParticles(player.x + 11, player.y, COL.heart, 8);
  }

  if (lives <= 0) {
    state = 'gameover';
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('bushrun_hi', highScore.toString());
    }
  }
}

function update() {
  if (state !== 'playing') return;
  frameCount++;

  // scroll
  difficultyLevel = Math.floor(score / 500);
  scrollSpeed = SCROLL_SPEED_BASE + difficultyLevel * 0.25;
  scrollY += scrollSpeed;
  score += 1;

  // player movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['a']) dx -= PLAYER_SPEED;
  if (keys['ArrowRight'] || keys['d']) dx += PLAYER_SPEED;
  if (keys['ArrowUp'] || keys['w']) dy -= PLAYER_SPEED;
  if (keys['ArrowDown'] || keys['s']) dy += PLAYER_SPEED;

  player.x += dx;
  player.y += dy + scrollSpeed; // player scrolls with world by default

  // keep player on screen (in world coords relative to camera)
  const screenY = player.y - scrollY;
  if (player.x < 4) player.x = 4;
  if (player.x > canvas.width - player.w - 4) player.x = canvas.width - player.w - 4;
  if (screenY < 20) player.y = scrollY + 20;
  if (screenY > canvas.height - player.h - 10) player.y = scrollY + canvas.height - player.h - 10;

  // invincibility
  if (invincibleTimer > 0) invincibleTimer--;

  // screen shake
  if (shakeTimer > 0) {
    shakeTimer--;
    shakeX = (Math.random() - 0.5) * 6;
    shakeY = (Math.random() - 0.5) * 6;
  } else {
    shakeX = 0;
    shakeY = 0;
  }

  // check bush hiding
  player.inBush = false;
  player.hidden = false;
  for (const b of bushes) {
    const bRect = { x: b.x, y: b.y, w: b.w, h: b.h };
    const pRect = { x: player.x, y: player.y, w: player.w, h: player.h };
    if (rectsOverlap(pRect, bRect)) {
      player.inBush = true;
      // need to press space or stay still to hide
      if (keys[' '] || (Math.abs(dx) < 0.1 && Math.abs(dy) < 0.1)) {
        player.hidden = true;
        player.bushTimer++;
        // bonus points for hiding
        if (player.bushTimer % 30 === 0) {
          score += 25;
          spawnParticles(player.x + 11, player.y - scrollY + 14, COL.score, 3);
        }
      }
      break;
    }
  }
  if (!player.inBush) {
    player.bushTimer = 0;
  }

  // update obstacles
  for (const ob of obstacles) {
    ob.x += ob.vx;
    ob.walkFrame += 0.12;
    // bounce off screen edges
    if (ob.x < TILE) { ob.x = TILE; ob.vx *= -1; ob.dir = 1; }
    if (ob.x > canvas.width - ob.w - TILE) { ob.x = canvas.width - ob.w - TILE; ob.vx *= -1; ob.dir = -1; }

    // collision with player
    const oRect = { x: ob.x, y: ob.y, w: ob.w, h: ob.h };
    const pRect = { x: player.x, y: player.y, w: player.w, h: player.h };
    if (rectsOverlap(pRect, oRect)) {
      hitObstacle(ob);
    }
  }

  // extend world
  extendWorld();

  // particles
  updateParticles();
}

// ---------- rendering ----------
function drawGround(camY) {
  for (let screenRow = -1; screenRow < ROWS + 2; screenRow++) {
    const worldRow = Math.floor((camY / TILE) + screenRow);
    const tileY = screenRow * TILE - (camY % TILE);
    const row = worldRows[worldRow];
    if (!row) continue;
    for (let col = 0; col < COLS; col++) {
      const tile = row[col];
      const tx = col * TILE;
      if (tile === 'path') {
        ctx.fillStyle = COL.path;
      } else if (tile === 'pathEdge') {
        ctx.fillStyle = COL.pathEdge;
      } else {
        // grass dithering
        ctx.fillStyle = (col + worldRow) % 2 === 0 ? COL.grass1 : COL.grass2;
      }
      ctx.fillRect(tx, tileY, TILE, TILE);
    }
  }
}

function drawHUD() {
  // score bar background
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, canvas.width, 30);

  // score
  drawText(`SCORE: ${score}`, 8, 20, 14, COL.score, 'left');

  // high score
  drawText(`HI: ${highScore}`, canvas.width - 8, 20, 12, '#aaa', 'right');

  // lives
  for (let i = 0; i < lives; i++) {
    const hx = canvas.width / 2 - 30 + i * 22;
    ctx.fillStyle = COL.heart;
    ctx.fillRect(hx, 8, 6, 6);
    ctx.fillRect(hx + 8, 8, 6, 6);
    ctx.fillRect(hx - 1, 12, 7, 4);
    ctx.fillRect(hx + 8, 12, 7, 4);
    ctx.fillRect(hx + 1, 16, 12, 3);
    ctx.fillRect(hx + 3, 19, 8, 2);
    ctx.fillRect(hx + 5, 21, 4, 1);
  }

  // bush hint
  if (player.inBush && !player.hidden) {
    drawText('PRESS SPACE TO HIDE!', canvas.width / 2, canvas.height - 40, 12, '#fff', 'center');
  }
  if (player.hidden) {
    const alpha = 0.5 + Math.sin(frameCount * 0.1) * 0.3;
    ctx.globalAlpha = alpha;
    drawText('HIDDEN!', canvas.width / 2, canvas.height - 40, 16, COL.bushLight, 'center');
    ctx.globalAlpha = 1;
  }
}

function drawTitleScreen() {
  // background
  ctx.fillStyle = '#2a4a2a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // animated grass bg
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.fillStyle = (c + r + Math.floor(frameCount / 20)) % 2 === 0 ? COL.grass1 : COL.grass2;
      ctx.fillRect(c * TILE, r * TILE, TILE, TILE);
    }
  }

  // decorative bushes
  const time = frameCount * 0.02;
  for (let i = 0; i < 8; i++) {
    drawBush({
      x: 30 + i * 65 + Math.sin(time + i) * 10,
      y: 340 + Math.cos(time + i * 0.7) * 15 + scrollY,
      w: 40, h: 32, hasFlower: i % 3 === 0
    }, scrollY);
  }

  // title box
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(60, 80, canvas.width - 120, 280);
  ctx.strokeStyle = COL.bushLight;
  ctx.lineWidth = 3;
  ctx.strokeRect(60, 80, canvas.width - 120, 280);

  // title
  drawTextOutline('BUSHRUN', canvas.width / 2, 140, 48, COL.bushLight, '#1a3a1a');
  drawText('8-BIT CAMPUS EDITION', canvas.width / 2, 170, 12, COL.score);

  // instructions
  drawText('Skip between bushes on campus', canvas.width / 2, 210, 13, '#ccc');
  drawText('while avoiding other students!', canvas.width / 2, 230, 13, '#ccc');

  drawText('ARROW KEYS / WASD to move', canvas.width / 2, 265, 11, '#aaa');
  drawText('SPACE to hide in bushes', canvas.width / 2, 282, 11, '#aaa');

  // blink prompt
  if (Math.floor(frameCount / 30) % 2 === 0) {
    drawText('PRESS SPACE OR ENTER TO START', canvas.width / 2, 330, 14, COL.text);
  }

  if (highScore > 0) {
    drawText(`HIGH SCORE: ${highScore}`, canvas.width / 2, 360, 12, COL.score);
  }

  frameCount++;
}

function drawGameOverScreen() {
  // darken
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(100, 140, canvas.width - 200, 240);
  ctx.strokeStyle = '#e04060';
  ctx.lineWidth = 3;
  ctx.strokeRect(100, 140, canvas.width - 200, 240);

  drawTextOutline('GAME OVER', canvas.width / 2, 200, 36, '#e04060', '#400010');
  drawText(`SCORE: ${score}`, canvas.width / 2, 245, 20, COL.score);

  if (score >= highScore && score > 0) {
    drawText('NEW HIGH SCORE!', canvas.width / 2, 275, 14, '#f0e060');
  }

  drawText(`HIGH SCORE: ${highScore}`, canvas.width / 2, 305, 14, '#aaa');

  if (Math.floor(frameCount / 30) % 2 === 0) {
    drawText('PRESS SPACE TO PLAY AGAIN', canvas.width / 2, 350, 13, COL.text);
  }

  frameCount++;
}

function render() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  if (state === 'title') {
    drawTitleScreen();
    ctx.restore();
    return;
  }

  const camY = scrollY;

  // ground
  drawGround(camY);

  // decorations (behind everything)
  for (const d of decorations) {
    const dy = d.y - camY;
    if (dy < -80 || dy > canvas.height + 20) continue;
    if (d.type === 'tree') drawTree(d.x, dy);
    else if (d.type === 'building') drawBuilding(d.x, dy);
    else drawLamppost(d.x, dy);
  }

  // sort everything by Y for proper overlap
  const drawables = [];
  bushes.forEach(b => {
    if (b.y - camY > -60 && b.y - camY < canvas.height + 40)
      drawables.push({ type: 'bush', obj: b, y: b.y });
  });
  obstacles.forEach(o => {
    if (o.y - camY > -60 && o.y - camY < canvas.height + 40)
      drawables.push({ type: 'obstacle', obj: o, y: o.y });
  });
  drawables.push({ type: 'player', y: player.y });
  drawables.sort((a, b) => a.y - b.y);

  for (const d of drawables) {
    if (d.type === 'bush') {
      drawBush(d.obj, camY);
    } else if (d.type === 'obstacle') {
      const ob = d.obj;
      const sy = ob.y - camY;
      drawCharacter(ob.x, sy, ob.w, ob.h, ob.style, ob.walkFrame, ob.dir, ob.name);
      // name tag
      const nameColor = ob.name === 'Cindy' ? '#ff69b4' : '#fff';
      drawText(ob.name, ob.x + ob.w / 2, sy - 6, 9, nameColor, 'center');
    } else {
      drawPlayer(camY);
    }
  }

  // if player is hidden, redraw the bush they're in on top
  if (player.hidden) {
    for (const b of bushes) {
      if (rectsOverlap(
        { x: player.x, y: player.y, w: player.w, h: player.h },
        { x: b.x, y: b.y, w: b.w, h: b.h }
      )) {
        drawBush(b, camY);
        // eyes peek out
        const py = player.y - camY;
        if (frameCount % 30 < 20) {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(player.x + 8, py + 6, 3, 2);
          ctx.fillRect(player.x + 14, py + 6, 3, 2);
          ctx.fillStyle = '#000';
          ctx.fillRect(player.x + 9, py + 7, 2, 1);
          ctx.fillRect(player.x + 15, py + 7, 2, 1);
        }
        break;
      }
    }
  }

  // particles
  drawParticles(camY);

  // HUD
  drawHUD();

  // game over overlay
  if (state === 'gameover') {
    drawGameOverScreen();
  }

  ctx.restore();
}

// ---------- main loop ----------
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
